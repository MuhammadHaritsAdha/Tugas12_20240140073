<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 12 - Simple ID Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 text-slate-800">

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-8 bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        
        <!-- BAGIAN KIRI: Form Input (Sederhana & Bersih) -->
        <section class="space-y-5">
            <div>
                <h1 class="text-xl font-bold text-slate-900">Data Identitas</h1>
                <p class="text-sm text-slate-500">Silakan isi form untuk memperbarui kartu.</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Nama Mahasiswa</label>
                    <input type="text" id="in-nama" oninput="update()" placeholder="Contoh: Budi Santoso" 
                           class="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">Program Studi (Select)</label>
                    <select id="in-jurusan" onchange="update()" class="w-full border border-slate-300 rounded-lg p-2.5 outline-none bg-white focus:border-indigo-500">
                        <option value="-">-- Pilih Jurusan --</option>
                        <option value="Teknologi Informasi">Teknologi Informasi</option>
                        <option value="Teknik Mesin">Teknik Mesin</option>
                        <option value="Teknik Elektro">Teknik Elektro</option>
                        <option value="Teknik Sipil">Teknik Sipil</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">Tanggal Bergabung (Date)</label>
                    <input type="date" id="in-tgl" onchange="update()" class="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-indigo-500">
                </div>
            </div>
            
            <div class="p-3 bg-indigo-50 border-l-4 border-indigo-500 rounded text-xs text-indigo-700">
                Data akan berubah otomatis pada kartu di sebelah kanan.
            </div>
        </section>

        <!-- BAGIAN KANAN: Preview Kartu Vertikal (Elegan & Simpel) -->
        <section class="flex justify-center items-center bg-slate-100 rounded-xl p-6">
            <div id="kartu" class="w-64 bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                
                <!-- Header Kartu -->
                <div class="bg-indigo-700 p-4 text-center">
                    <div class="w-8 h-2 bg-indigo-900/30 mx-auto rounded-full mb-3"></div>
                    <h2 class="text-white text-xs font-bold tracking-widest uppercase">Student Pass</h2>
                </div>

                <!-- Foto Area -->
                <div class="flex justify-center mt-6">
                    <div class="w-28 h-32 bg-slate-200 border-2 border-slate-100 rounded-lg flex items-center justify-center overflow-hidden">
                        <span id="inisial" class="text-4xl font-bold text-slate-400">?</span>
                    </div>
                </div>

                <!-- Konten Data -->
                <div class="p-6 text-center">
                    <h3 id="out-nama" class="text-lg font-bold text-slate-900 leading-tight truncate">NAMA LENGKAP</h3>
                    <p id="out-jurusan" class="text-sm font-medium text-indigo-600 mt-1 uppercase tracking-tight">Program Studi</p>
                    
                    <div class="mt-6 pt-4 border-t border-dashed border-slate-300 text-left">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] text-slate-400 uppercase font-bold">Valid Since</span>
                            <span id="out-tgl" class="text-[11px] font-bold text-slate-700">-- / -- / ----</span>
                        </div>
                    </div>
                </div>

                <!-- Footer Kartu (Barcode Simpel) -->
                <div class="bg-slate-50 p-3 flex justify-center items-center gap-1">
                    <div class="h-6 w-1 bg-slate-300"></div>
                    <div class="h-6 w-0.5 bg-slate-300"></div>
                    <div class="h-6 w-2 bg-slate-300"></div>
                    <div class="h-6 w-1 bg-slate-300"></div>
                    <div class="h-6 w-0.5 bg-slate-400"></div>
                    <div class="h-6 w-1 bg-slate-300"></div>
                    <div class="h-6 w-2 bg-slate-300"></div>
                </div>
            </div>
        </section>

    </div>

    <script>
        function update() {
            // Ambil data dari input
            const nama = document.getElementById('in-nama').value;
            const jurusan = document.getElementById('in-jurusan').value;
            const tgl = document.getElementById('in-tgl').value;

            // Update teks di kartu
            document.getElementById('out-nama').innerText = nama || "NAMA LENGKAP";
            document.getElementById('out-jurusan').innerText = (jurusan !== "-") ? jurusan : "PROGRAM STUDI";
            
            // Update inisial di area foto
            if(nama.trim()) {
                document.getElementById('inisial').innerText = nama.charAt(0).toUpperCase();
            } else {
                document.getElementById('inisial').innerText = "?";
            }

            // Format tanggal Indonesia
            if(tgl) {
                const d = new Date(tgl);
                const opsi = { day: 'numeric', month: 'short', year: 'numeric' };
                document.getElementById('out-tgl').innerText = d.toLocaleDateString('id-ID', opsi);
            } else {
                document.getElementById('out-tgl').innerText = "-- / -- / ----";
            }
        }
    </script>
</body>
</html>
